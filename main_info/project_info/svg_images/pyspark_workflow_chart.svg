<svg viewBox="0 0 640 900" xmlns="http://www.w3.org/2000/svg" width="640" height="900" font-family="Arial, Helvetica, sans-serif">
  <title>schwab_market_data_pyspark — end-to-end workflow</title>
  <desc>Flowchart from reading SchwabQuotesHistory through Spark window-function analytics to optional write-back to SQL Server.</desc>

  <rect x="0" y="0" width="640" height="900" fill="#ffffff"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4b5563" />
    </marker>
  </defs>

  <text x="320" y="24" text-anchor="middle" font-size="15" font-weight="600" fill="#111827">schwab_market_data_pyspark — end-to-end workflow</text>
  <text x="320" y="44" text-anchor="middle" font-size="10" fill="#6b7280">Rolling moving averages, Bollinger Bands, and Z-Score anomaly flags via Spark window functions</text>

  <!-- Box 1 -->
  <circle cx="140" cy="79" r="12" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="140" y="83" text-anchor="middle" font-size="11" fill="#111827">1</text>
  <rect x="170" y="58" width="300" height="42" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="320" y="75" text-anchor="middle" font-size="12" fill="#111827">Run main.py</text>
  <text x="320" y="90" text-anchor="middle" font-size="10" fill="#374151">user starts the job</text>
  <line x1="320" y1="100" x2="320" y2="122" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 2 -->
  <circle cx="140" cy="143" r="12" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="140" y="147" text-anchor="middle" font-size="11" fill="#111827">2</text>
  <rect x="170" y="122" width="300" height="42" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="320" y="139" text-anchor="middle" font-size="12" fill="#111827">AppConfig.load()</text>
  <text x="320" y="154" text-anchor="middle" font-size="10" fill="#374151">reads .ini — [sqlserver] + [spark]</text>
  <line x1="320" y1="164" x2="320" y2="186" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 3 -->
  <circle cx="140" cy="207" r="12" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="140" y="211" text-anchor="middle" font-size="11" fill="#111827">3</text>
  <rect x="170" y="186" width="300" height="42" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="320" y="203" text-anchor="middle" font-size="12" fill="#111827">SparkSessionFactory.create()</text>
  <text x="320" y="218" text-anchor="middle" font-size="10" fill="#374151">builds SparkSession + JDBC config</text>
  <line x1="320" y1="228" x2="320" y2="250" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 4: input DB cylinder (external) -->
  <circle cx="140" cy="271" r="12" fill="#ccfbf1" stroke="#14b8a6"/>
  <text x="140" y="275" text-anchor="middle" font-size="11" fill="#111827">4</text>
  <path d="M 195 254 L 445 254 L 445 292 A 125 8 0 0 1 195 292 Z" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <ellipse cx="320" cy="254" rx="125" ry="8" fill="#99f6e4" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="320" y="271" text-anchor="middle" font-size="12" fill="#111827">dbo.SchwabQuotesHistory</text>
  <text x="320" y="286" text-anchor="middle" font-size="10" fill="#374151">input — populated by sibling schwab_market_data</text>
  <line x1="320" y1="300" x2="320" y2="322" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 5 -->
  <circle cx="140" cy="343" r="12" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="140" y="347" text-anchor="middle" font-size="11" fill="#111827">5</text>
  <rect x="170" y="322" width="300" height="42" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="320" y="339" text-anchor="middle" font-size="12" fill="#111827">HistoryReader.read()</text>
  <text x="320" y="354" text-anchor="middle" font-size="10" fill="#374151">JDBC read, filtered by symbols + date range</text>
  <line x1="320" y1="364" x2="320" y2="386" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 6 -->
  <circle cx="140" cy="407" r="12" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="140" y="411" text-anchor="middle" font-size="11" fill="#111827">6</text>
  <rect x="170" y="386" width="300" height="42" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="320" y="403" text-anchor="middle" font-size="12" fill="#111827">add_moving_stats()</text>
  <text x="320" y="418" text-anchor="middle" font-size="10" fill="#374151">rolling avg/std window function, cached</text>

  <!-- split -->
  <line x1="270" y1="428" x2="160" y2="466" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="370" y1="428" x2="480" y2="466" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 7L -->
  <rect x="40" y="466" width="240" height="42" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="160" y="483" text-anchor="middle" font-size="12" fill="#111827">add_bollinger_bands()</text>
  <text x="160" y="498" text-anchor="middle" font-size="10" fill="#374151">upper/lower bands</text>

  <!-- Box 7R -->
  <rect x="360" y="466" width="240" height="42" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="480" y="483" text-anchor="middle" font-size="12" fill="#111827">add_zscore()</text>
  <text x="480" y="498" text-anchor="middle" font-size="10" fill="#374151">anomaly flags</text>

  <!-- converge -->
  <path d="M 160 508 L 160 528 L 320 546" fill="none" stroke="#4b5563" stroke-width="1.5"/>
  <path d="M 480 508 L 480 528 L 320 546" fill="none" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 8 -->
  <circle cx="140" cy="567" r="12" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="140" y="571" text-anchor="middle" font-size="11" fill="#111827">7</text>
  <rect x="170" y="546" width="300" height="42" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="320" y="563" text-anchor="middle" font-size="12" fill="#111827">.show(50, truncate=False)</text>
  <text x="320" y="578" text-anchor="middle" font-size="10" fill="#374151">prints both result tables to console</text>

  <!-- branch to write-back pair -->
  <line x1="270" y1="588" x2="160" y2="616" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="370" y1="588" x2="480" y2="616" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="320" y="602" text-anchor="middle" font-size="10" fill="#374151">only if --write-back</text>

  <!-- Box 9: two DB cylinders -->
  <ellipse cx="160" cy="616" rx="105" ry="7" fill="#99f6e4" stroke="#14b8a6" stroke-width="1.5"/>
  <path d="M 55 616 L 265 616 L 265 654 A 105 7 0 0 1 55 654 Z" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="160" y="634" text-anchor="middle" font-size="11" fill="#111827">_SparkBollinger</text>
  <text x="160" y="648" text-anchor="middle" font-size="9" fill="#374151">SQL Server</text>

  <ellipse cx="480" cy="616" rx="105" ry="7" fill="#99f6e4" stroke="#14b8a6" stroke-width="1.5"/>
  <path d="M 375 616 L 585 616 L 585 654 A 105 7 0 0 1 375 654 Z" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="480" y="634" text-anchor="middle" font-size="11" fill="#111827">_SparkZScore</text>
  <text x="480" y="648" text-anchor="middle" font-size="9" fill="#374151">SQL Server</text>

  <text x="320" y="662" text-anchor="middle" font-size="10" fill="#374151">8</text>

  <!-- converge to done -->
  <path d="M 160 661 L 160 680 L 320 692" fill="none" stroke="#4b5563" stroke-width="1.5"/>
  <path d="M 480 661 L 480 680 L 320 692" fill="none" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 320 588 L 320 692" fill="none" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Final -->
  <rect x="170" y="702" width="300" height="42" rx="21" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="320" y="719" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">9 · Done</text>
  <text x="320" y="734" text-anchor="middle" font-size="10" fill="#374151">ready for Power BI / reporting</text>

  <!-- Legend -->
  <line x1="30" y1="772" x2="610" y2="772" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="30" y="787" width="16" height="14" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="52" y="798" font-size="10" fill="#374151">setup / read step</text>
  <rect x="170" y="787" width="16" height="14" rx="3" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="192" y="798" font-size="10" fill="#374151">Spark compute step</text>
  <ellipse cx="330" cy="794" rx="12" ry="4" fill="#99f6e4" stroke="#14b8a6" stroke-width="1.5"/>
  <rect x="318" y="794" width="24" height="8" fill="#ccfbf1" stroke="none"/>
  <text x="348" y="798" font-size="10" fill="#374151">SQL Server table</text>
  <rect x="470" y="787" width="16" height="14" rx="3" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="492" y="798" font-size="10" fill="#374151">done</text>

  <text x="320" y="825" text-anchor="middle" font-size="9" fill="#9ca3af">No changes were made to analytics/ or db/ logic — this chart documents the existing pipeline as built.</text>
</svg>
